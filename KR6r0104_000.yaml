body:
  text: 佛祖正傳古今捷録序佛祖正傳機語事迹見於兩土之文者凡數十家按西天諸祖出自梁之僧祐祖述支疆是以支那正派傳燈諸録得以沿襲備載存乎大藏周遍寰宇歷二千六百餘年家傳戶誦使吾輩得覩先賢面目若揭日月於中天恩則溥矣奈何宏博浩渺曷能博綜約究況諸家著述皆祖傳燈然傳燈止於宋之密庵咸傑而已其下元明迄今十七八傳尚未聞其名號況氏族朝代之出處乎因閲藏典以天童老人曹溪源流兼輯少林六世仍采正傳事迹朝代僧臘諡賜法嗣目曰古今正傳捷録俾未至者泝流而尋源既入者統本以運末不用搜求便入法王寶藏一覽而衆美具足吾佛所謂觀彼久遠猶如今日不圖一會儼然祇貴流通正眼集者意在斯焉若吾佛應世七十九年示涅槃相當周代穆王壬申之歲後一千一十七年傳二十世至闍夜多即此土漢孝明永平丁卯教被華夏至一千四百七十年傳二十八世即梁武普通元年庚子歲乃達磨至金陵之際已上事迹方册頗多人所共曉斯不重出聊備來哲博覽云大清康熙五年歲在丙午上元後學雪兆性識并頌
