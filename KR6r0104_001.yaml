body:
  text: 西蜀比丘果性集初祖菩提達磨大師姓剎帝利南印土香至王季子也得法於二十七祖般若多羅祖囑曰俟吾滅後六十年當往震旦國闡化問曰彼有法器堪繼吾宗千載之下有留難否祖預為讖偈逮尊者順世師乃演化本國六宗歸正時至東行王具大舟實以衆寶躬率臣僚送至海濵凡三周達於南海時梁普通元年庚子九月刺史蕭昂表上有詔迎見王問如何是聖諦第一義師曰廓然無聖王曰對朕者誰師曰不識王未契遂渡江至魏止嵩山少林寺面壁而坐越九年欲返西天乃命門人盍言所得有道副道育尼總持各呈見解最後慧可禮拜依位而立祖曰汝得吾髓乃以從上囑纍授之曰吾來此土見赤縣神洲有大乘氣象今既得汝吾意已終言畢端居而逝起塔熊耳山定林寺時梁武大通二年後三歲遇宋雲於蔥嶺之事頌廓然無聖對梁王話不投機暗渡江雖使神光輸一臂令人千古嘆行藏二祖慧可大師武牢姬氏子少博群書極精玄理及覽佛經超然有悟依龍門得度具戒年四十定中見神告曰將登聖果須臾頭痛如刺欲行求醫神復告曰此換骨耳非常痛也因此告師師視其頂有五峯隆起喻曰神既助汝可行求道吾聞天竺達磨近至少林宜往依之遂詣參承祖常端坐面壁莫聞誨勵師自惟昔人求道敲骨取髓刺血濟飢布髮掩泥投崖飼虎古尚若此我又何人侍立遲明積雪過膝祖曰諸佛無上妙道曠劫精勤難行能行非忍而忍豈以小德小智輕心慢心欲冀真乘徒勞勤苦師聞誨勵斷臂祖前祖曰汝今斷臂吾前求亦可也宜名慧可師曰我心未寧乞師安心祖曰將心來與汝安師曰覓心了不可得祖曰吾與汝安心竟於是得法至北齊天平二年得燦付法自往鄴都行化三十四載因辨和法師謗於邑宰翟仲侃加師以法祖知前業怡然委順示寂於大隋開皇十三年三月十六日壽一百有七葬磁州東北頌談玄説妙語喃喃一見胡僧便絶言斷臂峯頭云得髓腥風從此落人間三祖僧燦大師以白衣謁二祖曰弟子身纏風恙請師懺罪祖曰將罪來與汝懺士良久曰覓罪了不可得祖曰吾與汝懺罪竟宜依佛法僧住曰今見師已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然士曰始知罪性不在內外中間祖然之即為剃髮曰是吾寶也宜名僧燦乃付衣法曰汝受吾教宜處深山未可行化當有國難般若多羅懸記所謂心中雖吉外頭凶者是也吾有宿纍今往酬之諦思聖記勿罹世難後值周武廢教往來太湖司空山深自韜晦積十餘載人無知者至隋開皇十二年遇沙彌道信付法後歷羅浮諸山舊止士民相率皈依為四衆説法於大樹之下儼然合掌立逝時隋煬帝大業二年丙寅十月五日有信心銘行於世身纏風恙罪何辜一見醫王業海枯罪生既無心亦泯大家相對嘴盧都四祖道信大師姓司馬居河內父徙蘄州師幼慕空宗諸解脫門宛如宿習請於三祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求脫乎信於言下大悟服勞九載攝心無𥧌既嗣祖風脅不至席者六十年隋大業十三載領徒抵吉州值羣盜圍城七旬不解萬衆惶怖祖憫之教誦摩訶般若賊衆望雉堞間若有神兵乃相謂曰城中必有異人遂即引去一日往黃梅值童子付以衣法時唐高祖武德中往破頭山訪懶融而隱學徒奔湊唐太宗響祖道德三詔不赴帝怒敕取首來使至師引頸就刃神色不變使還奏太宗彌加嘆慕示寂於唐高宗永徽二年辛亥閏九月四日壽七十二塔於東山頌費盡殷勤算海沙無繩自縛眼迷麻偶然針介相投處撥轉機綸便到家五祖黃梅弘忍大師蘄州周氏子也先為破頭山栽松道者常請法於四祖祖曰汝今已老脫或有聞其能廣化倘若再來吾可遲汝乃去行水邊見一女子浣衣揖以寄宿女首肯之即回䇿而去女歸輒孕父母惡而逐之既無所歸乃傭紡於衆館之下已而生子以為不祥拋棄港中明日泝流而上氣體鮮明見者驚異舉以成童嘗有異僧嘆曰此子闕七種相不逮如來一日於黃梅道中值四祖問曰汝何姓曰姓即有不是常姓祖曰是何姓曰是佛性祖曰汝無姓耶曰姓空故無祖默識其為法器即俾侍者至其母所乞令出家母以宿緣殊無難色乃從其請於是得法化道黃梅咸亨中傳法盧能示寂於高宗上元二年乙亥壽七十有四諡曰大滿嗣法一十三人頌氏族俱忘姓亦空了無依倚應環中破頭山上千株樹晝夜風𡀱萬竅通六祖慧能大師姓盧氏先是范陽人父行瑫母李氏遷於南海之新州感異夢娠六年乃生三歲喪父其母守制掬養及長家貧師樵採以給一日負薪於市聞客誦經有省直造黃梅祖問何來曰嶺南來祖曰欲須何事曰惟求作佛祖曰嶺南人無佛性若為堪作佛曰人即有南北佛性豈然祖曰者獦獠根性太利著槽廠去乃入碓坊服勞八月祖知付授時至乃令門人各書一偈若語意冥符則付衣法會下七百餘僧悉尊神秀書偈於壁師隨和之祖一日潛至碓坊見師腰石舂米問曰米熟也未師曰米熟已久猶欠篩耳祖以杖三擊其碓師即以三鼓入室祖以從上源流囑之曰昔達磨初至人未之信故傳衣表信今信心已熟衣乃爭端止汝勿傳師跪受訖問曰向甚處去祖曰逢懷則止遇會即藏是夜遁去隱於懷集四會之間儀鳳元年屆於曹溪以風幡之機觸發印宗於是大闡東山法門中宗屢詔不赴示寂於先天二年癸丑八月二日壽七十有六塔曹溪諡曰大鑑嗣法四十二人頌道箇無物是本來渾身難著出黃梅囊錐頴脫風幡外一滴曹溪五葉開第一世南嶽懷讓禪師高宗儀鳳三年佛誕日生感異瑞應於玄象太史奏聞帝敕親慰其家十五得度受具同坦然謁安國師安令詣曹溪見六祖祖問甚處來曰嵩山來祖曰甚麼物恁麼來師無語遂經八載忽然有省乃白祖曰某甲有箇會處祖曰作麼生師曰説似一物即不中祖曰還可修證否師曰修證即不無染污即不得祖曰祇此不污染諸佛之所護念汝既如是吾亦如是西天般若多羅讖汝足下出一馬駒踏殺天下人民不宜速説佛法師得法後侍祖復十五年先天二年往衡嶽居般若寺開元中得沙門道一付法示寂於唐玄宗天寶三年八月十一日諡曰大慧嗣法九人頌甚麼物也恁麼來天運違和花不開寒到一回徹骨處春風拖緑上莓苔第二世馬祖道一禪師四川漢州什邡縣馬氏子容貌奇偉牛行虎視引舌過鼻足有二輪出家於本邑羅漢寺受具戒已開元中習定衡嶽讓師知是法器問曰坐禪圖作甚麼曰圖作佛讓乃取一磚於庵前石上磨師曰磨作甚麼讓曰磨作鏡師曰磨磚豈得成鏡讓曰磨磚既不成鏡坐禪豈得作佛師曰如何即是讓曰如牛駕車車若不行打車即是打牛即是師無對讓示偈曰心地含諸種遇澤悉皆萌三昧華無相何壞復何成師蒙開示心意豁然出住江西入室弟子一百三十九人每見學者壯無所依老無所歸乃立叢林以統之唐德宗貞元四年二月一日示寂世壽八十諡曰大寂嗣法一百三十九人頌踏殺生靈天馬駒磨磚非鏡已知渠了然契悟花無相讖應西乾十萬餘第三世百丈懷海禪師福州長樂王氏子幼該三學長依大寂侍立次見一羣野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚處去師曰飛過去也祖遂扭師鼻頭負痛失聲祖曰又道飛過去也師於言下有省次日祖升堂衆才集師出卷却席祖便下座師隨至方丈祖曰我適來未曾説法汝為甚便卷却席師曰昨日被和尚搊得鼻痛祖曰汝昨日向甚處留心師曰今日鼻頭又不痛也祖曰汝深明作日事也出住洪州百丈因學者羣居不法乃制清規以導之凡作務執勞必先於衆主事請息師曰吾無德不合勞衆有一日不作一日不食之語流布叢林唐憲宗元和九年正月七日示寂嗣法一十五人諡曰大智頌一羣野鴨拍天飛驀鼻拽回馬簸箕卷席歸寮呈醜態由來堪笑亦堪悲第四世黃檗希運禪師閩人額間隆起志意沖淡參馬祖值祖遷化時百丈廬於塔傍乃請問馬祖平日得力句丈舉再參因緣曰老僧昔被馬大師一喝直得三日耳聾師聞舉不覺吐舌丈曰子已後莫承嗣馬祖去麼師曰不然今日因師舉得見馬祖大機之用然且不識馬祖若承馬祖已後喪我兒孫丈曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見一日丈問甚處來曰大雄山下採菌來丈曰還見大蟲麼師作虎聲丈拈斧作斫勢師打丈一摑丈吟吟而笑遂歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老人今日親遭一口出住洪州黃檗山嗣法三十三人示寂於唐宣宗大中年間諡曰斷濟頌武侯忠義振家沒世猶驚司馬降竭盡丹衷扶社稷英雄千古姓名揚第五世臨濟義玄禪師曹州南華邢氏子幼負出塵之志落髮受具便參黃檗行業純一時睦州為首座勉令問黃檗如何是佛法的的大意檗便打如是三問三度被打遂辭檗參大愚愚問甚處來曰黃檗愚曰黃檗有何言句師舉前話復云不知某甲有過無過愚曰黃檗恁麼老婆為汝徹困猶覓過在師於言下大悟云元來黃檗佛法無多子愚搊住曰這尿床鬼子適來道有過無過如今又道佛法無多子汝見箇甚麼道理速道速道師於愚肋下築三拳愚拓開曰汝師黃檗非干我是師回黃檗舉前話檗曰大愚老漢饒舌待來痛與一頓師曰説甚待來即今便打隨後便掌檗曰這風顛漢來這裏捋虎鬚師便喝檗曰侍者引這風顛漢參堂去後住鎮州臨濟學侶雲集乃有三玄三要賓主料揀以驗學者晚居大名府興化寺嗣法二十四人示寂於唐懿宗咸通八年丁亥四月諡曰慧照頌潦倒蒲鞋用不臧唆人喫棒意何良高安痛處重加艾帶纍兒孫遭禍殃第六世興化存獎禪師初為臨濟侍者後在三聖會中為首座嘗曰我向南方行腳一遭拄杖頭不曾撥著個會佛法底人聖聞得問曰汝具個甚麼眼便恁麼道師便喝聖曰須是汝始得後到大覺為院主一日覺曰聞汝道向南方行腳一遭拄杖頭不曾撥著個會佛法底人汝憑個甚麼道理與麼道師便喝覺便打師又喝覺又打明日師從法堂過覺召院主我直下疑你昨日這兩喝師復喝覺又打師再喝覺又打師曰某於三聖師兄處學得個賓主句總被師兄拆倒了也願與某個安樂法門覺曰者瞎漢來者裏納敗闕脫下衲衣痛打一頓忽於言下薦得臨濟先師於黃檗處喫棒的道理出住興化開堂日拈香云此炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賖不如供養臨濟先師後唐莊宗詔問賜紫嗣法五人示寂於同光二年乙酉諡曰廣濟嚴霜冷雪逼寒梅觸著春風笑眼開不遣落花隨水去恐驚巴峽夜猿哀第七世南院慧顒禪師河北人得法興化住汝州南禪寶應寺上堂云赤肉團上壁立千仞時有僧問赤肉團上壁立千仞豈不是和尚道師曰是僧掀倒禪床師曰你看者瞎漢亂作僧擬議師便打趂出後五代周太祖廣順二年壬子示寂嗣法二人頌無位真人赤肉團從來鼻孔自遼天臨機撥轉千鈞拏只射威音那畔邊第八世風穴延沼禪師餘杭劉氏子一舉不第出家初參鏡清次謁南院院問南方一棒作麼生商量師曰作奇特商量師却問和尚此間一棒作麼生商量院拈拄杖曰棒下無生忍臨機不見師師於言下大徹玄旨後因避亂郢州李史君請上堂云祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住印即是不印即是時盧陂長老出曰某甲有鐵牛之機請師不搭印師曰慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙陂佇思師喝曰長老何不進語陂擬議師打一拂子曰還記得話頭麼試舉看陂擬開口師又一拂子牧主曰信之佛法與王法一般師曰見何道理曰當斷不斷返招其亂師便下座後因汝州太師宋侯捨宅為寺請師住持至周廣順元年復主風穴師生於唐昭宗乾寧三年丙辰十二月示寂於宋太祖開寶六年癸酉中秋日登座説偈而終塔於寺前溪之西畔嗣法四人頌棒下無生忍臨機不見師踏翻滄海月放出鐵牛機躍過禹門三汲浪却嗟蛙步𩥇沙泥第九世襄縣首山省念禪師萊州狄子氏遍遊叢席密誦法華晚依風穴充知客侍立次穴乃垂涕告之曰不幸臨濟之道至吾將墜於地矣師曰觀此一衆豈無人耶穴曰聰明者多見性者少師曰如某者何如穴曰吾雖望子久之恐汝耽著此經不能放下師曰此亦可事願聞其要穴遂升堂舉世尊以青蓮目顧視大衆且道説個甚麼若道不説而説又是埋沒先聖且道説個甚麼師乃拂袖下去穴擲拄杖歸方丈侍僧問念法華何不抵對和尚穴曰念法華會也次日與真園頭同上問訊穴曰作麼生是世尊不説説真曰鵓鳩樹頭鳴師曰動容揚古路不墮悄然機穴謂真曰作許多癡福作麼何不看念法華下語後住首山大振臨濟之道宋太宗淳化三年壬辰十二月四日登座曰今年六十七老病隨緣且遣日今年記却來年事來年記著今朝日至期安坐而逝茶毗收舍利建塔本山嗣法一十七人頌放下法華諳上堂青蓮目瞬絶承當歸來高踞首山寺明月清風滿大唐第十世汾陽善昭禪師太原俞氏子少有大志參尊宿七十餘人後謁首山問百丈卷席意旨如何山曰龍袖拂開全體現曰師意如何山曰象王行處絶狐蹤於是言下大悟拜起曰萬古碧潭空界月再三撈摝始應知有問者曰見何道理便爾自肯曰正是我放身命處服勞甚久前後八請主持名剎堅臥不就淳化四年首山入寂同門契聰領西河道俗千餘人排闥入而讓曰佛法大事靜退小節風穴懼應讖憂宗旨墜滅幸而有先師先師棄世汝有力荷擔如來大法者今何時而欲安眠哉師矍起握聰手曰非公不聞此語乃出主汾州太子院作十智同真以辨緇素後龍德府李侯與師有舊請住承天數至不起使者受罰後至曰不然有死而已師令設饌俶裝告衆曰老僧去也誰人隨得時數僧不契侍者出曰某甲隨得但和尚到處即到師曰汝乃隨得老僧復顧使者曰吾先行矣停箸而化侍者亦立化于側閲世七十有八坐五十六夏嗣法一十六人時宋仁宗天聖元年甲子歲收舍利起塔本寺頌龍袖拂開顯大機月輪撈摝淨無遺三玄戈甲清寰宇殺活分明不露絲第十一世石霜楚圓慈明禪師全州清湘李氏子二十二出家母有賢行使之遊方於大愚谷泉結伴參汾陽經二年未許入室每見必詬罵一日訴曰自至法席不蒙指示念歲月飄忽己事未明負失出家之利語未卒汾叱曰是惡知識敢裨販我舉杖逐之師擬伸救汾掩其口師乃大悟曰是知臨濟道出常情服役七年辭去出住潭州石霜師平生以事事無礙接人凡聖莫測室中宴坐橫刀水盆之上傍置草鞋使學者下語以卜契機得法者七十八人示寂於宋仁宗慶曆元年辛巳上元日塔於石霜頌歲月飄零取自由片幡風送到楊州室中拈起吹毛利冤報冤兮仇報仇第十二世楊岐方會禪師袁州宜春冷氏子小警敏不事筆硯及出家閲經典輒自神會參慈明總院事每恣參明曰庫司事繁且去他日又問明曰監院異時兒孫遍天下在何用忙為一日明出師偵之小徑搊住曰者老漢今日須與我説不説打你去明曰監寺知是般事便休語未卒師大悟即拜於泥塗明日上堂師出問幽鳥語喃喃辭雲入亂風時如何明曰我行荒草裏汝又入深村師曰官不容針便借一問明便喝師曰好喝明又喝師亦喝明連喝兩喝師禮拜明曰此事是個人方能擔荷師拂袖便行後住楊岐嘗以金剛圈栗棘蓬之語勘辨諸方宋仁宗皇祐元年丙戌示寂塔於本山嗣法一十四人頌院事匇匇不憚勞蹇驢三腳弄蹄高倒騎直上須彌頂大地山河在一毫第十三世白雲守端禪師衡陽葛氏子幼事翰墨冠依茶陵郁披削往參楊岐岐曰受業師為誰曰茶陵郁和尚岐曰聞伊過橋遭攧有省作偈甚奇能記否師誦偈岐笑而趨起師愕然通夕不昧黎明咨詢之岐曰汝見昨日打歐儺者麼曰見岐曰汝一籌不及渠師復駭然曰意旨如何岐曰渠愛人笑汝怕人笑師大悟於言下巾侍久之辭遊廬阜圓通訥禪師舉住承天聲名籍甚次徙法華龍門興化海會所至衆如雲集示寂於宋神宗熙寧五年丙戌壽四十八塔於舒州白雲嗣法一十二人頌竊得耆婆醫道神滿腔都是活人心真方假藥須靈驗到底難謾個裏人第十四世蘄州五祖法演禪師綿州鄧氏子年三十五始祝髮受具初謁浮山使叩白雲乃問南泉摩尼珠話雲叱之師領悟呈偈曰山前一片間田地叉手叮嚀問祖翁幾度買來還自賣為鄰松竹引清風雲乃印可令掌磨事一日雲曰有數禪客自廬山來皆有悟入處教伊説亦説得有來由舉因緣問伊亦明得教伊下語亦下得祇是未在師遂疑私自計曰既悟了明得説得如何却未在參究纍日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師後曰吾因茲出一身白汗便明得下載清風宋徽宗崇寧三年示寂嗣法二十三人頌等間識得摩尼珠揑碎光明始自如端的一回白汗後釋迦彌勒是他奴第十五世昭覺克勒禪師彭州洛氏子兒時日記千言偶遊妙寂寺見佛書三復悵然如獲舊物曰豫殆過去沙門也出家業講棄依白雲為侍者一日部使詣祖問道祖曰提刑少年曾讀小艷詩否有兩句頗相近頻呼小玉元無事只要檀郎認得聲部使應諾喏祖曰且仔細師侍立次問曰提刑會否祖曰他祇認得聲師曰祇要檀郎認得聲既認得聲為甚却不是祖曰如何是祖師西來意庭前柏樹子聻師忽有省遽出見雞飛上欄竿鼓翅而鳴乃曰此豈不是聲遂呈偈曰金鴨香銷錦繡幃笙歌叢裏醉扶歸少年一段風流事祇許佳人獨自知祖遍告山中耆宿曰我侍者參得禪也出住成都昭覺奉旨數處開法屢加寵賜宋高宗紹興五年八月己酉書偈投筆而逝茶毗舍利五色塔於本寺諡曰真覺嗣法七十六人頻呼小玉意無他試問檀郎會也麼認得聲來猶未是雞鳴絶妙識曹娥第十六世虎丘紹隆禪師和州含山人九歲出家既長遊方初謁長蘆後見佛果一日入室果問曰見見之時見非是見見猶離見見不能及舉拳云還見麼師曰見悟曰頭上安頭師聞脫然契證果叱曰見個甚麼師曰竹密不妨流水過果肯之有問曰隆藏主柔意若此何能為哉悟曰瞌睡虎耳後郡守李公光延居彰教次徙平江虎丘道大顯著宋高宗紹興六年丙辰五月六日示寂塔全身於寺西南嗣法一人見非是見足機籌竹密何曾礙水流春去秋來寒暑別不須頭上更安頭第十七世應庵曇華禪師蘄州江氏子生而奇傑出家遍歷諸方次見虎丘侍一載頓明大事出主明州天童虎丘忌日拈香云平生沒興撞著個無意智老和尚做盡伎倆湊泊不得從此卸却干戈隨分著衣喫飯二十年來坐曲彔牀懸羊頭賣狗肉知他有甚憑據雖然如是一年一度燒香日千古令人恨轉深時大慧在梅楊有僧傳語至慧極口稱嘆復寄偈曰坐斷金輪第一峯千妖百怪盡潛蹤年來又得真消息報道楊岐正脈通當時與大慧同稱二甘露門嘗誡徒曰衲僧家著草鞋住院何啻如蚖蛇戀窟乎宋孝宗隆興元年六月十三日示寂塔於本山天童嗣法九人頌草鞋踏破覓知音歷盡山河路轉深莫謂貧兒思舊債懸羊賣狗得人憎第十八世密庵咸傑禪師福州鄭氏子母夢老僧入舍而生幼則頴異過人及壯剃髮進具遍參知識最後謁應庵華於衢州明果一日問曰如何是正法眼答曰破沙盆應庵頷之因辭省親庵以偈送曰大徹投機句當陽廓頂門相從今四載徵詰洞無痕雖未付鉢袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便躲跟吾有末後句歸來要汝遵後出住衢州開法次遷祥符蔣山華藏未幾奉詔住徑山及靈隱嗣法拾人頌嶽邊頓止千山勢海上冥收萬派聲怪道如來正法眼祖師喚作破沙盆第十九世破庵祖先禪師廣安王氏子參寂庵於靈隱分座有道者請益曰胡孫子捉不住願垂開示師曰用捉作麼如風吹水自成紋上堂云不是心不是佛不是物忍俊不禁為諸人作個撇脫拈拄杖卓一下云流水暗消溪畔石勸人除却是非難嗣法四人那伽大定海涵秋上樹胡孫得自由四海五湖平似鏡行人莫與路為仇第二十世無準師範禪師蜀之梓童雍氏子九歲依陰平道欽出家首謁佛照照問何處人曰劍州照曰帶得劍來麼師隨聲便喝照曰者烏頭子也亂作後參破庵於靈隱居第一座一日侍庵遊石筍有道者請益胡孫話師在傍忽大悟後受詔住徑山賜號曰佛鑑禪師宋理宗淳祐己酉三月十五日示寂其徒請偈師執筆云來時空索索去也赤條條更要問端的天台有石橋塔於圓照庵嗣法一十七人頌帶得劍州寶劍來當陽一喝絶塵埃晚風笛弄關山曲巴峽猿聞聲自哀第二十一世雪巖祖欽禪師初參天目理後於無準會下多年每遇入室舉主人公便可𨁝跳若衲僧巴鼻佛祖爪牙更無下口處如是十年後過浙東天目依住一日佛殿前行忽然檯眸見一株古樹觸著向來所得境界和底一時揚下礙膺之物撲然而散方始得見徑山老人立地處正好三十拄杖後出世住潭州龍興晚住袁州仰山住持凡六剎無準忌日拈香云盡道先師今日死誰知今日是生朝不知却有何憑據紫柏黃檀一遽燒嗣法八人頌衲僧巴鼻忽擡眸觸著庭前樹一株要見徑山立地處烏藤三十嘴盧都第二十二世高峯原妙禪師吳江徐氏子母夢僧投宿而孕生於宋理宗戊戌歲出家首謁斷橋倫次參雪巖才問訊被打出後凡入門巖便問誰與汝拖者死尸來隨即打出如是不知其幾一日少林忌辰隨衆詣三塔諷經次忽擡頭覩五祖和尚真讚曰百年三萬六千朝反覆元來是者漢忽然打破疑情一日巖問日間浩浩時作得主麼曰作得主巖曰睡夢中作得主麼曰作得主巖曰正睡著時無夢無想無見無聞主在甚麼處師無對遂奮志入龍鬚自誓曰拚一生作個呆漢決要者一著子明白越五載因同參僧推枕子墜地作聲廓然大徹自謂如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處自此安定國天下太平一念無為十方坐斷出住雙髻天目示寂於大元成宗元真元年乙未十二月初一日嗣法四人頌阿誰拖者死尸來夢想俱無更活埋驀爾枕頭撲落地堪嗟雪嶺嘆奇哉第二十三世中峯明本禪師杭之錢塘人俗姓孫母李氏夢無門開道者持燈籠至家遂生師九歲喪母十五依高峯剃落年二十四觀流省有省詣峯求證峯打趂出因民訛傳官選童男女師問忽有人來問和尚討童男女時如何峯曰我但度竹篦子與他師於言下洞然徹法源底峯書真讚付師曰我相不思議佛祖莫能視獨許不肖兒見得半邊鼻且俾參徒詣師請益由是學者輻湊歸之如水就下而師猶自韜晦未嘗肯以師道自處一時天子公卿每虗徑山靈隱諸大剎迎師居之賜佛慈圓照廣慧之號示寂於大元英宗至治三年八月十四日諡曰普應嗣法㭍人頌源泉混混盡朝東海闊天高萬象融竹篦拈來全體露一毫頭上定綱宗第二十四世千巖元長禪師蕭山董氏子幻業儒年十七學通百氏十九離塵受具習律武林會丞相府飯僧師隨衆受供時中峯已先在座見師即呼曰汝日用如何師曰念佛峯曰佛今何在師擬議峯勵聲叱之師求開示峯授以狗子無佛性話令參於是縛茅靈隱山中倐忽十載因往望州亭聞聲有省往見峯峯復斥之師憤然不昧忽夜半鼠翻貓器墮地作聲恍然開悟覺身躍起數丈往質於峯峯問曰趙州何故言無師曰鼠食貓飯峯曰未在師曰飯器破也曰破後如何曰觸碎方甓峯乃微笑乃囑曰汝宜善自護持棲遁岩穴時節若至其理自彰自受付囑乃隱於天龍東庵聲光日顯詔居聖壽賜號圓鑑并金襴法衣示寂於大元順宗至正丁酉六月偈曰平生饒舌今日敗闕一句轟天正法眼滅嗣法四人頌貓器打翻絶點埃聲前恍覺笑顏開趙州狗子眠當道路上行人絶往來第二十五世萬峯時蔚禪師溫州金氏子母鄭氏夢儒釋二人入其寢覺生二子師居末有光燭室母懼弗舉其姑保而育之在襁褓中見僧微笑長依講主升公受具出家謁千巖長老長問將甚麼與老僧相見師竪拳云者裏與和尚相見巖曰死了燒了向甚處安身立命師曰漚生漚滅水還在風息波平月映潭巖問不是心不是佛不是物是個甚麼師以座具打圓相叉手而立一日普請斫松師拈圓石作獻珠狀曰請師酬價岩曰不值半文錢師曰瞎岩曰我也瞎汝也瞎師曰瞎瞎命充第一座巖上堂曰無風荷葉動必定有魚行師振威一喝拂袖便行巖示偈曰鬱鬱黃花滿目秋白雲端坐碧峯頭無賓主句輕拈出一喝千江水逆流師呈偈曰南泉不是惱人心有要將心去捉心不是我心不是佛性天空廓有何尋巖允之未幾潛隱巖召不赴乃以法衣頂相寄之後卓錫蘇州鄧蔚山叢席大振大明洪武十四年辛酉正月二十九日示寂嗣法一十三人頌出格英姿徹骨貧拳頭竪起當人情師資針介相投處喝下分明契主賓第二十六世寶藏普持禪師久依萬峯付法偈曰大愚肋下痛還拳三要三玄絶正偏臨濟窟中獅子子燈燈續焰古今傳繼住聖恩為第二世嗣法三人頌大愚肋下通消息派演滹沱正脈長坐却白雲終不妙移舟別有好商量第二十七世東明慧旵禪師丹陽王氏子年十四依湛然剃髮受具因定起觀松有省見寶藏呈悟因藏斥之遂親炙座下一日藏問心不是佛智不是道汝云何會師向前問訊叉手而立藏呵曰你在此許多時還作者個見解師乃發憤至第三日驀然徹法源底呈偈曰一拳打破太虗空百億須彌不露蹤借問個中誰是主扶桑湧出一輪紅藏囑曰善自護持大明宣德辛酉六月晦日示寂闍維舍利無數嗣法二人頌佛心智道一時休拶著虗空解轉頭百億須彌藏介子扶桑湧出一輪秋第二十八世海舟普慈禪師蘇之常孰錢氏子世宗儒業出家聽講楞嚴至但有言説都無實義處乃曰言説今日愈多矣遂歸尋思實義走見萬峯舉問峯以腳兩踏曰只者是實義師有省曰太費和尚尊力峯笑而許之乃結庵於洞庭山塢二十年因一僧呵其見解即棄庵詣東明明問曾見人否師曰説出恐驚人明曰假使親見釋迦依然是個俗漢但説何妨師曰萬峯明曰萬峯即今在甚麼處師面赤網然明曰若如此不曾見萬峯師歸寮三晝夜寢食俱忘偶值香燈繩斷墜地忽然大悟詣關前呈悟由明曰老闍黎承嗣萬峯去師曰公今為我打徹何得承嗣萬峯明遂出關升座曰瞿曇有意向誰傳迦葉無端展笑顏到此豈容七佛長文殊面赤也徒然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一派續綿綿擲拄杖云千斤擔子全分付玄要如今拄杖談以拂子擊三擊下座未幾東明辭世衆請繼席萬峯忌辰拈香喝兩喝云只笑你護短沒頭師佛法當人情便拜又拈香云此瓣香供養東明長老一片赤心鞭䇿令豫洞達宗源乃喝兩喝受恩深處便為家有乳方知是阿娘禮拜起慟哭歸方丈臨示寂説偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打云釋迦至我六十二世有不可數老和尚又打云多向者裏安身咄乃投筆而逝時景泰元年全身塔於東明左側得法一十二人頌將成九仞聳高峯一簣重圓始見功自是深恩歸有地千溪萬派盡潮東第二十九世寶峯明瑄禪師姑蘇吳江范氏子俗為木匠因海舟造塔傷足痛甚索酒喫舟謂曰幸是傷足若斫去其頭還能喫否即有省遂求出家乃充火頭一日負薪舟見曰將刺棘作麼師云是柴舟呵呵大笑師罔然舟曰是柴將去燒却師起疑問曰畢竟是甚麼道理舟不答是夜刻意參究不覺被火燎去眉毛面如刀割以鏡照之豁然大悟呈悟由於舟舟便打師奪拄杖云者條六尺竿幾年不曾用今日又重拈舟大笑師呈偈曰棒頭著處血痕班笑裏藏刀仔細看若是英靈真漢子死人喫棒口喃喃舟曰即此偈語可紹吾宗乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深藏止從此名聞遐邇學者雲集成化八年十二月九日示寂塔於東明寺左嗣法五人頌東倒西歪拆腳鐺匡持須是赤心人火燒刀斫鬚眉盡業鏡臺前露本真第三十世天奇本瑞禪師南昌鐘陵江氏子年二十隨父商於頴州偶厭世相禮無説能公披剃令看萬法歸一一歸何處話便參尊宿晝夜參究漸有省發末後參寶和尚峯問甚處來師曰北京峯云只在北京別有去處師曰隨方瀟灑峯云曾到四川否曰曾到峯曰四川境界與此間如何云江山雖異風月一般峯竪起拳頭云還有者個麼云無峯云因甚却無師云非我境界峯云如何是汝境界云諸佛不能識誰敢強安名峯云汝豈不是著空云終不向鬼窟裏作活計峯云西天九十六種外道你是第一師拂袖便出乃付偈曰濟山棒喝能輕觸殺活從前手眼清聖解凡情俱坐斷曇華猶放一枝新嗣法三十九人山川事迹名須異風月由來理自同鳥盡弓藏征伐寢萬乘垂拱坐寰中第三十一世絶學聞聰禪師邵武光澤縣奚氏子師生三歲父母繼亡外祖憐而養之十七得度二十受具精習毗尼止觀深究唯識等論一日遊百丈山逢一老宿問大通智勝佛十劫坐道場佛法不現前不得成佛道此理如何師乃依文講之老宿詬罵而去師從此頓發疑情念念在孜經五六載一日聞馬嘶豁然大悟曰如斯之事如來明見無有差謬遂見天奇奇問苦樂皆心因何外取曰祇為不了曰是非皆事因何妄承師曰錯認定盤星迷悟皆人因何不懂師曰早知燈是火豈向四方求乃付偈曰道者心同慈嫗心爭教赤子困羣陰輔成架海金梁子佛缺方知補浩任師後居龍泉寺有僧問如何是本來面目師曰石香亭僧云便任麼去時如何師云喪却了也僧問今朝孟夏八日天下叢林皆慶如來降誕之辰未審如來何處降誕師於几上畫一圓相出住隨州關子嶺得法五人頌歸家樵子爛柯陳到岸漁翁罷問津聖解凡情俱坐斷本來面目石香亭第三十二世笑巖德寶禪師金臺吳氏子世族錦衣弱冠時入寺聽講至舍國城妻子頭目手足感悟出家遍參名宿伏牛火場淨土止觀無所不歷因造關子嶺謁無聞聰公便問十聖三賢已全聖智如何道不明斯旨聰勵聲曰十聖三賢爾已知如何是旨速道師下語不契一日洗菜次偶一莖菜墜水逐水圜轉捉不著忽有省遂携籃歸聰見便問是甚麼曰一籃菜聰曰何不別道一句師曰請和尚別問來後與學圍爐次學曰人人有個本來父母子之父母今在何處師曰一火焚之學曰恁麼則子無父母耶師曰有即有佛眼不見學曰子還見麼師曰某亦不見學曰為甚麼不見師曰若見則非真父母遂呈偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明舉似師學深肯之萬曆辛巳正月十九日示寂得法十人頌隨身竿木覓歸家十聖三賢眼裏花要識渠儂真父母古今元不隔些些第三十三世幻有正傳禪師溧陽呂氏子年十九歲依樂庵和尚剃髮令看父母未生前話久無所契乃克勤精進歷二七餘日忽聞燈花𪹼聲有省直造燕都參笑巖和尚求證巖曰將汝從前得力處一一説來師具實答語中間巖驀躍出鞋曰向者裏道一句看遂把話端一時打斷通夕不𥧌至明旦猶立簷下巖出見喚之師回首巖翹一足作修羅障日月勢師當下脫然服勤數載禮辭南歸岩書從上源流付之臨行贈以一笠曰無露圭角師初住龍池次遷五臺北京普照晚復歸龍池題香爐偈曰有耳聞聲一似聾無容餘物動乎中灰心未必常如此嬴得清煙便不同又慮學者見落斷常著書三篇曰駁語曰性住釋曰物不遷刻行於世萬曆甲寅春仲示寂塔於本山嗣法四人天童悟罄山修淨名蓮徑山信罄山下出玉林秀頌躍出無跟破草鞋鐵山當面露崔嵬楖栗橫擔人不顧一踏鴻門兩扇開第三十四世天童密雲圓悟禪師宜興蔣氏子家貧樵採為業年二十七荷擔度山曲觸路傍積薪有省乃從幻有和尚出家每覺生死到來畢竟不穩當二六時中看得心境兩立古人道天地同根萬物一體越看越成兩個請益龍池池曰你若到者田地便放身倒臥嗣後惟加罵詈師慚悶交感遂掩關數載適傳公入都舉師監院事一日自城中歸過銅棺山頂忽覺情與無情煥然等現覓纖毫過患不可得大端説似人不得正所謂大地平沉底境界乃往覲幻幻問汝有新會處麼師曰一人有慶萬民樂業幻曰汝又作麼生曰某甲得來省覲和尚幻曰念子遠來放汝三十棒師抽身便出一日幻問忽有人問汝如何抵對師驀竪拳幻曰老僧不曉得者是甚麼意思師曰莫道和尚不曉得三世諸佛也不曉得又一日幻舉拂子問諸方還有者個麼師震威一喝幻曰好一喝師連喝兩喝歸位龍池一日喚師及覺宇入室曰老僧作夜起來走一回把柄都在手裏了汝等為我扶持佛法師呈偈曰若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰龍池目之大笑未幾示寂師依塔三載萬曆丁巳衆請繼席開法次住通玄金粟黃檗育王天童凡六巨剎宗風大振崇禎十五年壬午七月七日奄然坐化流光夜照四山變白壽七十有七自通玄迎全身歸塔於天童幻住庵右隴嗣法一十二人五峯學漢月藏破山明費隱容石車乘朝宗忍萬如微木陳忞石奇雲牧雲門浮石賢林野奇頌銅棺山頂擔頭空佛祖頻吞氣宇雄賞罰都來三十棒分明滅却少林宗第三十五世天童林野通奇禪師蜀之長樂蔡氏子生即絶腥依本里金鍾寺道然本然兩叔出家志存釋典離蜀之江南入講肆大明天啓丁卯息肩當湖掩關閲藏適友送密雲和尚語録展卷至參禪偈曰一念未生前試看底模樣頓覺疑情猛發寢食俱忘偶散步失足墜樓有省偈曰一念未生前六戶絶消息瞥爾揚雙眉大似眼無力遂破關詣密雲便問學人絶迹而來特為親近童云莫妄想師曰未審還有堂頭也無童云看腳下師云不因漁父引爭得見波濤童云莫錯會師禮拜天童一日升座云世尊初生便解指天指地汝等諸人討甚麼碗以拄杖一時打散師於言下全身脫落大徹玄旨乃受記莂於嘉禾黃暗齋觀察之素園時己卯秋九月也明年辭悟住靜於餘杭之廣化寺壬午秋聞悟訃音奔通玄後孫司馬碩膚諸檀護堅請開法通玄次遷東塔棲真己丑冬寧紹台三郡當道請主天童千指圍繞克復舊式冬夏布衣草履見衲子有輕裘緩帶則曰非吾類也淡泊之操始終無間大清順治九年壬辰三月二十九日出冶從天臺來省覲師曰汝來也冶拜云乞師更名師曰行果圓成遂安祥而逝世壽五十有八僧衲四十一塔於太白玲瓏巖新庵之左師誕於大明萬曆乙未十二月二十六日得法者五十人頌窮盡漚和覓指歸棒頭痛處覺前非危樓一踏虗空碎鼻孔分明向下垂第三十六世風穴雲峩行喜禪師蜀之資陽陳氏子萬曆四十八年癸丑正月二十四日誕年十歲時因觀死尸爛臭乃動諸行無常之感決志出家父母難之即自絶食久而許之遂投啓尊宿披剃遍參尊宿皆蒙䇿進略識指歸晚入天臺參靈野奇和尚一見便問杖頭撥轉罕遇知音狹路相逢如何通信奇云雲霧鎖千山師曰未到天台不妨疑著奇曰持蠡酌海妄測淺深師曰不因樵子徑爭到葛洪家奇曰峯巒挺秀鳥道難通師便喝奇便打於是親炙座下一日侍奇山行奇問山河大地明暗色空與你自己是同是別師曰同則總同別則總別奇正色呵曰説得道理好師無對奇即欄胸把住曰除却總別異同速道速道師佇思被奇驀向懸巖一推當下胸中寶惜廓爾冰消回觀從前所得如大海之一滴耳即説偈曰罷罷罷休休休橫眠倒臥在山丘翻身拶碎虗空骨萬象森羅笑點頭走呈方丈奇乃印可命理通玄院事奇住棲真命典藏鑰順治己丑九月六日乃出源流拂子付師師固辭奇曰汝但將去已後坐斷天下人舌頭耳於是禮辭北渡值陽山大慧及諸檀護請師開法普濟次遷龍池法興順治十三年丙申受請住風穴今乙巳竟十載矣時北方宗唱始自師焉躡蹻擔簦不計秋機關撥動滑如油天台痛處重加艾大海方知一滴收曹洞宗青原第五世洞山良價禪師會稽余氏子幼從師念心經有省乃謁雲巖悟旨授以寶鏡三昧出住豫章高安之洞山得曹山本寂宗風大振權開五位善接三根於是洞山宗始於斯矣唐懿宗咸通己丑三月七日示寂諡曰悟本下傳雲居膺膺傳同安丕丕傳同安志志傳梁山觀觀傳大陽玄玄傳投子青青傳芙蓉楷楷傳丹霞淳淳傳長蘆了了傳天童珏珏傳雪竇鑑鑑傳天童淨淨傳鹿門覺覺傳青州辨辨傳大明寶寶傳玉山體體傳雪巖滿滿傳萬松秀秀傳雪庭傳靈隱泰泰傳寶應遇遇傳淳拙才才傳松庭嚴嚴傳少室改改傳俱空斌斌傳無方從從傳月舟載載傳宗鏡書書傳大千潤潤傳慈舟念念傳湛然澄澄傳瑞白雪以上望青原乃三十七世矣宗鏡下復出廩山忠壽昌經博山來雪關誾壽昌下乃有東苑鏡天界盛溈仰宗溈山靈祐禪師曹溪第五世嗣百丈海福州長溪趙氏子久為百丈典座因司馬頭陀識之踢倒淨瓶而住溈山三十年以橡栗為食後得仰山父子酬唱大弘宗旨唐中宗大中七年正月九日示寂仰山慧寂韶州懷化葉氏子唐昭宗大順元年示寂仰山傳南塔湧湧傳芭蕉清清傳承天確確傳羅漢宗五世而寢雲門宗雲門文偃禪師曹溪第八世嘉與張氏子初參睦州損足而悟大旨後造雪峯而益資玄要乃嗣雪峯示寂於五代漢之隱帝乾祐元年四月雲門傳香林遠遠傳智門祚祚傳雪竇顯顯傳天衣懷懷傳法雲秀秀傳佛國白白傳慧林海海傳萬壽隆九世而寢望曹溪十六世而寂焉雲門第四世出洞山聰聰下出雲居舜舜傳明教嵩當宋仁宗之世乃著傳法正宗記定祖圖輔教篇目曰鐔津集入藏法眼宗曹溪第十世清涼文益禪師餘杭魯氏子出家受具精究毗尼傍探儒典乃遊文藻之場師以玄機一發雜務俱捐乃謁羅漢琛禪師於言下大徹玄旨出住金陵三坐道場示寂於五代周世宗顯德戊午間諡曰大法眼故稱為法眼宗下傳清涼欽欽傳雲居齊齊傳保福煦煦傳智者如如傳承天月月傳護國豐六世而寢益之二世有永明延壽壽乃天台紹國師之子當大宋趙太祖開寶八年示寂法眼宗望曹溪十六世而止焉汝州風穴延沼禪師塔銘并序輪王御世誠以利物為心含識沉淪固執塵情是念殆非一言而可濟權設三藏以熏陶令其空有俱捐證乎理事無礙由是世尊觀正法之堪傳拈花于靈山會上迦葉悟離言之妙旨微笑于人天衆前滅度千有餘年相傳二十八世摩騰入漢翻貝葉于天中初祖來梁闡別傳于教外由是立雪斷臂始契安心六世至曹溪派演一花開五葉十世傳臨濟跨門三頓喪全機考釋迦于臨濟已二十八傳遡沼祖于達磨僅一十四世嗟夫沼祖生于五運孜孜復振頺綱乃子乃孫碁布星分于海內如麻如葦敲風打雨震寰中某幸依師席忝在門墻矧銘記來勒于浮圖慨行狀無聞于后世援毫稽首敬述端由據夫風穴和尚法諱延沼出于唐季之乾寧誕在餘杭之劉氏幼而喜素豁達有齠齓之奇長既業儒超然無經世之意一舉不第乘興歸來投禮開元披緇秉具精修止觀博極羣經首見雪峯咨臨濟兩堂一喝指參的派兒孫次謁道怤瀉懸河倒浪千尋猶憐俊哉衲子結守廓作良朋寓華嚴為綱紀諸方法戰詎同門外之遊人南院機投親承入室之真子遇風而止開法始紹顒師乘願而來灼然可支臨濟單丁七載鼎革六朝白雲山中午夜燒松光日月郢州衙內鐵牛機下釣鯨鯢棒如雨點佛祖之正令全提喝似雷崩衲子之命根頓斷涖衆二十餘年一時道冠天下語默涉離微常憶江南三月裏如何通不犯鷓鴣啼處白花香誠然學本生知信夫神機天縱感仰山之懸讖恐祖道之將危乃升曲彔木床遂舉青蓮目話鵓鳩樹頭鳴句下未投真長老動容揚古路言前機契念闍黎付託既得其人始有終焉之計時惟大宋開寶六年癸酉八月旦日書別遠近檀那登座復為説偈道在乘時須濟物遠方來慕自騰騰他年有叟情相似日日香煙夜夜燈至中秋日跏趺而逝閲世七十有八僧臘五十九夏塔于寺前溪之西畔緬維祖道筆舌難窮俯慚仰愧祝皇道與佛道齊昌祖述憲章冀師恩與親恩永大銘曰黃面浙子氣宇如王學兼內外感世無常乘悲願力建大法幢適遊襄沔法戰諸方棒頭取證坐白雲鄉單丁七載用舍行藏三會説法六易時王朝秦暮楚獨傲風霜縱鐵牛機緇白心降道啓臨濟獨步大方輝增日月大振頺綱子孫蟄蟄嫩桂昌昌某生甚幸感佩餘光稽首再拜𪫟惕倣徨祈法脈而永久祝國祚以悠長勒斯真玫來哲其詳大清康熙五年歲次丙午暮春遠孫果性熏沐頓述許昌比丘覺心通一真善助刻
